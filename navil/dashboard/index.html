<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navil Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="ambient"></div>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">N</span>
      <div>
        <h1>Navil</h1>
        <p>Adaptive Security Command Center</p>
      </div>
    </div>
    <div class="top-actions">
      <label for="api-token">API Token</label>
      <input id="api-token" type="password" placeholder="local-dev-token" />
      <button id="save-token" class="ghost">Use Token</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel panel-control">
      <h2>Launch Scan</h2>
      <p class="caption">Strict scope enforcement is mandatory.</p>
      <label for="target-input">Targets (comma separated)</label>
      <input id="target-input" type="text" placeholder="https://staging.example.com" />

      <label for="scope-input">Scope Path</label>
      <input id="scope-input" type="text" value=".navil-scope.yml" />

      <label for="plugins-input">Plugins</label>
      <input id="plugins-input" type="text" placeholder="xss,sqli,headers" />

      <div class="button-row">
        <button id="start-scan" class="primary">Start Scan</button>
        <button id="refresh-findings" class="ghost">Refresh Findings</button>
      </div>

      <div class="scan-meta" id="scan-meta">
        <p>No active scan.</p>
      </div>
    </section>

    <section class="panel panel-metrics">
      <h2>Live Metrics</h2>
      <div class="metric-grid">
        <article>
          <p>Total Findings</p>
          <h3 id="metric-findings">0</h3>
        </article>
        <article>
          <p>Critical/High</p>
          <h3 id="metric-critical">0</h3>
        </article>
        <article>
          <p>Reward Score</p>
          <h3 id="metric-reward">0.0</h3>
        </article>
      </div>
      <canvas id="severity-chart" height="180"></canvas>
    </section>

    <section class="panel panel-reward">
      <h2>Brain Reward Curve</h2>
      <canvas id="reward-chart" height="180"></canvas>
      <div id="brain-status" class="caption">No training events yet.</div>
    </section>

    <section class="panel panel-feed">
      <h2>Realtime Scan Feed</h2>
      <ul id="event-feed"></ul>
    </section>

    <section class="panel panel-findings">
      <h2>Findings</h2>
      <table>
        <thead>
          <tr>
            <th>Severity</th>
            <th>Plugin</th>
            <th>Title</th>
            <th>URL</th>
          </tr>
        </thead>
        <tbody id="findings-table"></tbody>
      </table>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
