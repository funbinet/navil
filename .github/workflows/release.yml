name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -f docker/Dockerfile -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .

      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
