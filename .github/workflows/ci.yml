name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check navil tests scripts

      - name: Type Check
        run: mypy navil tests scripts

      - name: Unit Tests
        run: pytest tests/ -v --cov=navil --cov-report=xml --cov-report=term --cov-fail-under=55

      - name: Dependency Audit
        run: pip-audit

      - name: Docker Build
        run: docker build -f docker/Dockerfile .
